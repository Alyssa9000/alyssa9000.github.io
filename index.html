<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>佟昕阳 Alyssa | AI Pre-sales & Builder</title>
    <meta
      name="description"
      content="佟昕阳 Alyssa · AI 产品售前 & Builder · 展示 AI 技能、作品集与职业经历的个人网站。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">
          <span class="brand-name">Xinyang Tong</span>
          <span class="brand-alias">Alyssa</span>
        </div>
        <nav class="nav">
          <button class="nav-toggle" aria-label="Toggle navigation">
            <span></span><span></span><span></span>
          </button>
          <ul class="nav-list">
            <li><a href="#hero" data-i18n-key="nav.home"></a></li>
            <li><a href="#ai-skills" data-i18n-key="nav.aiSkills"></a></li>
            <li><a href="#experience" data-i18n-key="nav.experience"></a></li>
            <li><a href="#education" data-i18n-key="nav.education"></a></li>
            <li><a href="#contact" data-i18n-key="nav.contact"></a></li>
          </ul>
          <div class="lang-switch">
            <button
              class="lang-btn active"
              data-lang="zh"
              aria-label="切换为中文"
            >
              中文
            </button>
            <span class="lang-divider">/</span>
            <button
              class="lang-btn"
              data-lang="en"
              aria-label="Switch to English"
            >
              EN
            </button>
          </div>
        </nav>
      </div>
    </header>

    <main>
      <!-- Hero -->
      <section id="hero" class="section hero-section">
        <div class="container hero-inner">
          <div class="hero-text">
            <p class="hero-eyebrow" data-i18n-key="hero.eyebrow"></p>
            <h1 class="hero-title">
              <span data-i18n-key="hero.name"></span>
            </h1>
            <p class="hero-subtitle" data-i18n-key="hero.subtitle"></p>
            <div class="hero-tags">
              <span class="tag" data-i18n-key="hero.tag1"></span>
              <span class="tag" data-i18n-key="hero.tag2"></span>
              <span class="tag" data-i18n-key="hero.tag3"></span>
            </div>
            <div class="hero-actions">
              <a
                href="./cv-cn.pdf"
                class="btn primary"
                target="_blank"
                rel="noreferrer"
                data-i18n-key="hero.btn.cn"
              ></a>
              <a
                href="./cv-en.pdf"
                class="btn outline"
                target="_blank"
                rel="noreferrer"
                data-i18n-key="hero.btn.en"
              ></a>
            </div>
          </div>
          <div class="hero-visual" aria-hidden="true">
            <div class="hero-card">
              <div class="hero-card-header">
                <span class="dot red"></span>
                <span class="dot amber"></span>
                <span class="dot green"></span>
              </div>
              <div class="hero-card-body">
                <p class="hero-card-label" data-i18n-key="hero.card.title"></p>
                <h3 class="hero-card-heading" data-i18n-key="hero.card.heading"></h3>
                <ul class="hero-traits">
                  <li>
                    <span
                      class="trait-kicker"
                      data-i18n-key="hero.trait1.kicker"
                    ></span>
                    <span
                      class="trait-body"
                      data-i18n-key="hero.trait1.body"
                    ></span>
                  </li>
                  <li>
                    <span
                      class="trait-kicker"
                      data-i18n-key="hero.trait2.kicker"
                    ></span>
                    <span
                      class="trait-body"
                      data-i18n-key="hero.trait2.body"
                    ></span>
                  </li>
                  <li>
                    <span
                      class="trait-kicker"
                      data-i18n-key="hero.trait3.kicker"
                    ></span>
                    <span
                      class="trait-body"
                      data-i18n-key="hero.trait3.body"
                    ></span>
                  </li>
                  <li>
                    <span
                      class="trait-kicker"
                      data-i18n-key="hero.trait4.kicker"
                    ></span>
                    <span
                      class="trait-body"
                      data-i18n-key="hero.trait4.body"
                    ></span>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- AI Skills -->
      <section id="ai-skills" class="section">
        <div class="container">
          <header class="section-header">
            <p class="section-eyebrow" data-i18n-key="aiSkills.eyebrow"></p>
            <h2 class="section-title" data-i18n-key="aiSkills.title"></h2>
            <p class="section-desc" data-i18n-key="aiSkills.desc"></p>
          </header>
          <div class="grid grid-3">
            <article class="card">
              <h3 class="card-title" data-i18n-key="aiSkills.card1.title"></h3>
              <p class="card-text" data-i18n-key="aiSkills.card1.body"></p>
              <ul class="card-list">
                <li data-i18n-key="aiSkills.card1.point1"></li>
                <li data-i18n-key="aiSkills.card1.point2"></li>
              </ul>
            </article>
            <article class="card">
              <h3 class="card-title" data-i18n-key="aiSkills.card2.title"></h3>
              <p class="card-text" data-i18n-key="aiSkills.card2.body"></p>
              <ul class="card-list">
                <li data-i18n-key="aiSkills.card2.point1"></li>
                <li data-i18n-key="aiSkills.card2.point2"></li>
              </ul>
            </article>
            <article class="card">
              <h3 class="card-title" data-i18n-key="aiSkills.card3.title"></h3>
              <p class="card-text" data-i18n-key="aiSkills.card3.body"></p>
              <ul class="card-list">
                <li data-i18n-key="aiSkills.card3.point1"></li>
                <li data-i18n-key="aiSkills.card3.point2"></li>
              </ul>
            </article>
          </div>
          <div class="ai-gallery-cta">
            <a
              href="https://alyssa9000.github.io/Gallery/"
              target="_blank"
              rel="noreferrer"
              class="btn text-link"
              data-i18n-key="aiSkills.viewGallery"
            ></a>
          </div>
        </div>
      </section>

      <!-- Experience -->
      <section id="experience" class="section">
        <div class="container">
          <header class="section-header">
            <p
              class="section-eyebrow"
              data-i18n-key="experience.eyebrow"
            ></p>
            <h2 class="section-title" data-i18n-key="experience.title"></h2>
            <p class="section-desc" data-i18n-key="experience.desc"></p>
          </header>
          <div class="timeline">
            <article class="timeline-item">
              <div class="timeline-meta">
                <span
                  class="timeline-period"
                  data-i18n-key="experience.item1.period"
                ></span>
                <span
                  class="timeline-location"
                  data-i18n-key="experience.item1.location"
                ></span>
              </div>
              <h3
                class="timeline-title"
                data-i18n-key="experience.item1.title"
              ></h3>
              <p
                class="timeline-company"
                data-i18n-key="experience.item1.company"
              ></p>
              <ul class="timeline-points">
                <li data-i18n-key="experience.item1.point1"></li>
                <li data-i18n-key="experience.item1.point2"></li>
                <li data-i18n-key="experience.item1.point3"></li>
              </ul>
            </article>

            <article class="timeline-item">
              <div class="timeline-meta">
                <span
                  class="timeline-period"
                  data-i18n-key="experience.item2.period"
                ></span>
                <span
                  class="timeline-location"
                  data-i18n-key="experience.item2.location"
                ></span>
              </div>
              <h3
                class="timeline-title"
                data-i18n-key="experience.item2.title"
              ></h3>
              <p
                class="timeline-company"
                data-i18n-key="experience.item2.company"
              ></p>
              <ul class="timeline-points">
                <li data-i18n-key="experience.item2.point1"></li>
                <li data-i18n-key="experience.item2.point2"></li>
                <li data-i18n-key="experience.item2.point3"></li>
              </ul>
            </article>

            <article class="timeline-item">
              <div class="timeline-meta">
                <span
                  class="timeline-period"
                  data-i18n-key="experience.item3.period"
                ></span>
                <span
                  class="timeline-location"
                  data-i18n-key="experience.item3.location"
                ></span>
              </div>
              <h3
                class="timeline-title"
                data-i18n-key="experience.item3.title"
              ></h3>
              <p
                class="timeline-company"
                data-i18n-key="experience.item3.company"
              ></p>
              <ul class="timeline-points">
                <li data-i18n-key="experience.item3.point1"></li>
                <li data-i18n-key="experience.item3.point2"></li>
                <li data-i18n-key="experience.item3.point3"></li>
                <li data-i18n-key="experience.item3.point4"></li>
              </ul>
            </article>
          </div>
        </div>
      </section>

      <!-- Education -->
      <section id="education" class="section section-alt">
        <div class="container">
          <header class="section-header">
            <p
              class="section-eyebrow"
              data-i18n-key="education.eyebrow"
            ></p>
            <h2 class="section-title" data-i18n-key="education.title"></h2>
          </header>
          <div class="grid grid-2 education-grid">
            <div class="education-column">
              <article class="card">
                <h3
                  class="card-title"
                  data-i18n-key="education.anu.title"
                ></h3>
                <p class="card-meta" data-i18n-key="education.anu.degree"></p>
                <p class="card-text" data-i18n-key="education.anu.period"></p>
              </article>
              <article class="card">
                <h3
                  class="card-title"
                  data-i18n-key="education.bfsu.title"
                ></h3>
                <p
                  class="card-meta"
                  data-i18n-key="education.bfsu.degree"
                ></p>
                <p class="card-text" data-i18n-key="education.bfsu.period"></p>
              </article>
            </div>
            <div class="education-column">
              <article class="card">
                <h3
                  class="card-title"
                  data-i18n-key="education.cert.title"
                ></h3>
                <p
                  class="card-meta"
                  data-i18n-key="education.cert.body"
                ></p>
              </article>
              <article class="card">
                <h3
                  class="card-title"
                  data-i18n-key="education.lang.title"
                ></h3>
                <p
                  class="card-meta"
                  data-i18n-key="education.lang.body"
                ></p>
              </article>
            </div>
          </div>
        </div>
      </section>

      <!-- Contact -->
      <section id="contact" class="section">
        <div class="container">
          <header class="section-header">
            <p
              class="section-eyebrow"
              data-i18n-key="contact.eyebrow"
            ></p>
            <h2 class="section-title" data-i18n-key="contact.title"></h2>
            <p class="section-desc" data-i18n-key="contact.desc"></p>
          </header>
          <div class="contact-layout">
            <div class="contact-info">
              <dl class="contact-list">
                <div class="contact-item">
                  <dt data-i18n-key="contact.phoneLabel"></dt>
                  <dd>+86 150-0452-9737</dd>
                </div>
                <div class="contact-item">
                  <dt data-i18n-key="contact.emailLabel"></dt>
                  <dd>
                    <a href="mailto:xinyang.tong@outlook.com"
                      >xinyang.tong@outlook.com</a
                    >
                  </dd>
                </div>
                <div class="contact-item">
                  <dt data-i18n-key="contact.cityLabel"></dt>
                  <dd data-i18n-key="contact.cityValue"></dd>
                </div>
                <div class="contact-item">
                  <dt data-i18n-key="contact.statusLabel"></dt>
                  <dd data-i18n-key="contact.statusValue"></dd>
                </div>
              </dl>
            </div>
            <div class="contact-qr">
              <p class="contact-qr-label" data-i18n-key="contact.wechatLabel"></p>
              <div class="qr-wrapper">
                <img
                  src="./wechat-qr.jpg"
                  alt="WeChat QR"
                  class="qr-image"
                  loading="lazy"
                />
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p data-i18n-key="footer.copy"></p>
      </div>
    </footer>

    <script src="./main.js"></script>
  </body>
</html>
